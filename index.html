<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruggero e Claudia</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Work+Sans:wght@400;500;600&family=Playfair+Display:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap');

:root{
  --bg:#f6f1e4;
  --bg-panel:#fffdf7;
  --ink:#1f2a24;
  --ink-soft:#5b665c;
  --accent:#b3667a;
  --accent2:#af8a3f;
  --line:#d9d0ba;
  --green:#5f8259;
  --red:#a8503f;
  --orange:#c1893f;
  --font-display:'Fraunces', serif;
  --font-body:'Inter', sans-serif;
  --radius:14px;
  --bg-image: none;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  color:var(--ink);
  background: var(--bg-image), linear-gradient(var(--bg), var(--bg));
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  min-height:100vh;
}
#app{min-height:100vh; display:flex; flex-direction:column;}
a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit; font-size:14px;}

.wrap{max-width:980px; margin:0 auto; padding:0 24px; width:100%;}
.center-wrap{flex:1; display:flex; align-items:center; justify-content:center; padding:24px;}

.thread{
  width:100%; height:14px; margin:6px 0 18px 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='14'><path d='M0 7 Q 15 0 30 7 T 60 7 T 90 7 T 120 7' fill='none' stroke='%23b3667a' stroke-width='1.4' stroke-linecap='round'/></svg>");
  background-repeat:repeat-x; opacity:0.6;
}

.card{
  background:var(--bg-panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:28px;
  box-shadow:0 1px 2px rgba(31,42,36,0.04);
}
.eyebrow{
  font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--accent2); font-weight:600; margin:0 0 6px 0;
}
h1,h2,h3{font-family:var(--font-display); font-weight:600; margin:0 0 8px 0; color:var(--ink);}
h1{font-size:clamp(28px,4vw,42px); font-style:italic; font-weight:500;}
h2{font-size:22px;}
h3{font-size:16px;}
p{line-height:1.55; color:var(--ink-soft); margin:0 0 12px 0;}

.field{margin-bottom:16px;}
.field label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; letter-spacing:.02em;}
.field input, .field select, .field textarea{
  width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:9px;
  background:#fff; color:var(--ink); outline:none;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--accent);}

.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:10px 18px; border-radius:999px; border:1px solid transparent;
  font-size:14px; font-weight:600; letter-spacing:.01em; transition:opacity .15s, transform .1s;
}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--ink); color:#fdfbf4;}
.btn-primary:hover{opacity:.88;}
.btn-accent{background:var(--accent); color:#fff;}
.btn-accent:hover{opacity:.88;}
.btn-ghost{background:transparent; color:var(--ink); border-color:var(--line);}
.btn-ghost:hover{border-color:var(--ink);}
.btn-outline-red{background:#fff; color:var(--red); border-color:var(--red);}
.btn-mail{background:#fff; color:var(--accent2); border-color:var(--accent2);}
.btn-wa{background:#fff; color:#3f8a5a; border-color:#3f8a5a;}
.btn-sm{padding:6px 13px; font-size:12.5px;}
.btn[disabled]{opacity:.4; cursor:default;}
.btn-block{width:100%;}

.error-msg{color:var(--red); font-size:13px; margin:-6px 0 14px 0;}
.hint{font-size:12.5px; color:var(--ink-soft); margin-top:4px;}
.mono-hint{font-size:12px; color:var(--accent2); font-weight:600; margin-top:2px;}

.seal{width:13px;height:13px;border-radius:50%; display:inline-block; box-shadow: inset 0 -1px 2px rgba(0,0,0,.25), 0 0 0 2px rgba(255,255,255,.6);}
.seal.green{background:var(--green);}
.seal.red{background:var(--red);}
.seal.orange{background:var(--orange);}
.status-row{display:flex; align-items:center; gap:8px;}
.status-label{font-size:13px; color:var(--ink-soft);}

.topbar{
  background:rgba(255,253,247,0.85); backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line); position:sticky; top:0; z-index:10;
}
.topbar-inner{display:flex; align-items:center; justify-content:space-between; padding:14px 24px; max-width:980px; margin:0 auto; flex-wrap:wrap; gap:10px;}
.brand{font-family:var(--font-display); font-style:italic; font-size:19px;}
.nav-tabs{display:flex; gap:6px; flex-wrap:wrap;}
.nav-tab{
  padding:7px 14px; border-radius:999px; font-size:13.5px; font-weight:600;
  background:transparent; border:1px solid transparent; color:var(--ink-soft);
}
.nav-tab.active{background:var(--ink); color:#fdfbf4;}
.topbar-actions{display:flex; align-items:center; gap:10px;}

main{flex:1; padding:32px 0 60px 0;}

.rsvp-choice{display:flex; gap:12px; margin:18px 0;}
.rsvp-btn{flex:1; padding:16px; border-radius:12px; border:1.5px solid var(--line); background:#fff; text-align:center; font-weight:600; font-size:15px;}
.rsvp-btn.yes.selected{border-color:var(--green); background:rgba(95,130,89,0.1); color:var(--green);}
.rsvp-btn.no.selected{border-color:var(--red); background:rgba(168,80,63,0.1); color:var(--red);}
.rsvp-btn:hover{border-color:var(--accent);}

.info-block{margin-bottom:26px;}
.info-block .addr{font-size:14px; color:var(--ink-soft); margin-bottom:10px;}
.map-link-btn{margin:6px 0 4px 0;}
.tag-list{list-style:none; padding:0; margin:10px 0 0 0; display:flex; flex-direction:column; gap:6px;}
.tag-list li{font-size:13.5px; color:var(--ink-soft); padding-left:16px; position:relative;}
.tag-list li:before{content:'—'; position:absolute; left:0; color:var(--accent2);}

table{width:100%; border-collapse:collapse; font-size:13.5px;}
th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); padding:8px 10px; border-bottom:1px solid var(--line);}
td{padding:9px 10px; border-bottom:1px solid #ece5d2; vertical-align:middle;}
tr:hover td{background:rgba(179,102,122,0.04);}

.toolbar{display:flex; gap:10px; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap;}
.toolbar input[type=text]{width:220px;}

.stat-row{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:22px;}
.stat{flex:1; min-width:120px; background:var(--bg-panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px;}
.stat .num{font-family:var(--font-display); font-size:26px; font-style:italic;}
.stat .lbl{font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft);}

.list-item-row{display:flex; gap:10px; align-items:flex-start; padding:12px; border:1px solid var(--line); border-radius:10px; margin-bottom:10px; background:#fff;}
.list-item-row .grow{flex:1;}
.chip{display:inline-block; font-size:11px; padding:2px 9px; border-radius:999px; background:rgba(175,138,63,0.15); color:var(--accent2); font-weight:600;}
.chip.wait{background:rgba(193,137,63,0.18); color:var(--orange);}

.swatch-row{display:flex; gap:10px; flex-wrap:wrap;}
.swatch-row .field{flex:1; min-width:140px;}
input[type=color]{padding:2px; height:38px;}

.invite-row{border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:12px; background:#fff;}
.invite-row-top{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}
.invite-contacts{display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;}
.invite-contacts input{padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:13px; width:200px;}
.invite-actions{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
.sent-note{font-size:11.5px; color:var(--ink-soft); margin-top:6px;}

.toast{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:var(--ink); color:#fdfbf4; padding:10px 18px; border-radius:999px; font-size:13px;
  box-shadow:0 6px 20px rgba(0,0,0,.2); z-index:100; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

.modal-overlay{
  position:fixed; inset:0; background:rgba(31,42,36,.55); z-index:200;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.modal-box{
  background:var(--bg-panel); border-radius:16px; padding:28px; max-width:380px; width:100%;
  text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.25);
}
.modal-box img{width:100%; max-width:280px; border-radius:8px; border:1px solid var(--line); margin:14px 0;}

.footer-note{text-align:center; color:var(--ink-soft); font-size:12px; margin-top:36px;}

@media(max-width:640px){
  .topbar-inner{flex-direction:column; align-items:flex-start; gap:10px;}
  .rsvp-choice{flex-direction:column;}
  .toolbar{flex-direction:column; align-items:stretch;}
  .toolbar input[type=text]{width:100%;}
  .invite-contacts input{width:100%;}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* =============================================================================
   CONFIGURAZIONE — incolla qui l'URL del tuo Web App di Google Apps Script
   (lo ottieni dopo aver pubblicato lo script collegato al Google Sheet, vedi
   le istruzioni fornite insieme a questo file). Nessuna fatturazione richiesta:
   usa solo il tuo account Google normale.
   ========================================================================== */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxgSJe0hGenonQV9xOM39L2egZAB0VXtrxITNUbcoNswNylctt7QCDy7SEJSe-jBUx3/exec";

const backendReady = APPS_SCRIPT_URL && APPS_SCRIPT_URL !== "INSERISCI_QUI";

async function apiRead(action, params){
  const qs = new URLSearchParams(Object.assign({action}, params||{})).toString();
  const res = await fetch(APPS_SCRIPT_URL + '?' + qs);
  return await res.json();
}
async function apiWrite(action, params){
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(Object.assign({action}, params||{}))
  });
  return await res.json();
}

/* ============================= STATE ============================= */
let state = {
  settings: null,
  guests: [],            // populated only for admin sessions
  currentUser: null,     // {type:'admin'} | {type:'guest'}
  guestRecord: null,     // populated only for the logged-in guest's own record
  view: 'login',
  adminTab: 'invitati',
  guestTab: 'save-the-date',
  invitiSubTab: 'da-invitare',
  qrModalUsername: null,
  loading: true,
  loginError: '',
  prefillGuest: '',
  busy: false
};

function defaultSettings(){
  return {
    coupleNames: 'Ruggero & Claudia',
    password: 'ruggeroclaudia',
    adminUsername: 'sposi',
    allowSelfRegister: false,
    publicBaseUrl: '',
    welcomeTitle: 'Ci sposiamo',
    weddingDateLabel: '',
    welcomeMessage: 'Non vediamo l\'ora di festeggiare questo giorno con voi. Qui trovate tutte le informazioni per il grande giorno.',
    ceremony: { name:'', address:'', parking: [] },
    reception: { name:'', address:'', logoUrl:'' },
    hotels: [],
    saveTheDate: { photo:'', text:'' },
    templates: {
      invite: {
        subject: 'Save the date - {sposi}',
        body: 'Ciao {nome}!\n\n{sposi} si sposano: segnatevi la data!\n\nScopri il nostro annuncio qui:\n{link}\n\nUsername: {username}\nPassword: quella che vi abbiamo comunicato a voce\n\nL\'invito con tutti i dettagli arriverà più avanti. A presto!'
      },
      reminder: {
        subject: 'Un piccolo promemoria - {sposi}',
        body: 'Ciao {nome},\n\nnon abbiamo ancora ricevuto la tua risposta al nostro invito. Ci farebbe piacere sapere se ci sarai!\n\nPuoi rispondere qui:\n{link}\n\nGrazie di cuore, {sposi}'
      },
      invito: {
        subject: 'Il nostro invito - {sposi}',
        body: 'Ciao {nome}!\n\nÈ arrivato il momento: ecco il nostro invito con tutti i dettagli su cerimonia, ricevimento e dove dormire.\n\nEntra qui per confermare la tua presenza:\n{link}\n\nA prestissimo, {sposi}'
      }
    },
    theme: {
      bg:'#f6f1e4', panel:'#fffdf7', ink:'#1f2a24', accent:'#b3667a', accent2:'#af8a3f',
      fontPair:'botanical', bgImage:'', heroImage:''
    }
  };
}

const FONT_PAIRS = {
  botanical: { display:"'Fraunces', serif", body:"'Inter', sans-serif", label:'Fraunces + Inter' },
  romantico: { display:"'Cormorant Garamond', serif", body:"'Work Sans', sans-serif", label:'Cormorant + Work Sans' },
  moderno: { display:"'Playfair Display', serif", body:"'Inter', sans-serif", label:'Playfair + Inter' },
  classico: { display:"'Fraunces', serif", body:"'Source Sans 3', sans-serif", label:'Fraunces + Source Sans' }
};

/* ============================= USERNAME / SLUG ============================= */
function slugify(name){
  return (name||'')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-zA-Z0-9]/g,'')
    .toLowerCase();
}

/* ============================= STORAGE: SETTINGS (Google Sheet via Apps Script) ============================= */
async function loadSettings(){
  try{
    const res = await apiRead('getSettings', {});
    state.settings = (res && res.data) ? res.data : defaultSettings();
    if(!res || !res.data) await apiWrite('setSettings', {data: state.settings});
  }catch(e){ state.settings = defaultSettings(); }
  if(!state.settings.templates) state.settings.templates = defaultSettings().templates;
  if(!state.settings.templates.invito) state.settings.templates.invito = defaultSettings().templates.invito;
  if(!state.settings.saveTheDate) state.settings.saveTheDate = defaultSettings().saveTheDate;
  if(!state.settings.ceremony) state.settings.ceremony = defaultSettings().ceremony;
  if(!Array.isArray(state.settings.ceremony.parking)) state.settings.ceremony.parking = [];
  if(!state.settings.reception) state.settings.reception = defaultSettings().reception;
  if(!Array.isArray(state.settings.hotels)) state.settings.hotels = [];
  if(!state.settings.theme) state.settings.theme = defaultSettings().theme;
  if(state.settings.reception && state.settings.reception.logoUrl===undefined) state.settings.reception.logoUrl='';
}
async function saveSettings(){
  try{
    await apiWrite('setSettings', {data: state.settings});
    showToast('Impostazioni salvate');
  }catch(e){ showToast('Errore nel salvataggio'); }
}

/* ============================= STORAGE: GUESTS (one row per guest in the "Guests" sheet tab) =============================
   Each guest is one row in the Google Sheet, keyed by username. A guest session only ever
   asks the backend for its own username, so other guests' data (brunch invites, contacts,
   rsvp) is never loaded into a guest's browser. Only the sposi (admin) session asks for
   the full list. */
function normalizeGuestObj(g){
  if(g.id===undefined) g.id = g.username;
  if(g.name===undefined) g.name='';
  if(g.rsvp===undefined) g.rsvp=null;
  if(g.respondedAt===undefined) g.respondedAt=null;
  if(g.brunchRsvp===undefined) g.brunchRsvp=null;
  if(g.brunchRespondedAt===undefined) g.brunchRespondedAt=null;
  if(g.email===undefined) g.email='';
  if(g.phone===undefined) g.phone='';
  if(g.inviteSentAt===undefined) g.inviteSentAt=null;
  if(g.reminderSentAt===undefined) g.reminderSentAt=null;
  if(g.fullInviteSentAt===undefined) g.fullInviteSentAt=null;
  if(g.brunchInvite===undefined) g.brunchInvite=false;
  if(g.ageCategory===undefined) g.ageCategory='adulto';
  return g;
}
async function fetchGuestByUsername(username){
  try{
    const res = await apiRead('getGuest', {username});
    return res && res.data ? normalizeGuestObj(res.data) : null;
  }catch(e){ return null; }
}
async function saveGuestRecord(g){
  try{ await apiWrite('setGuest', {username: g.username, data: g}); return true; }
  catch(e){ showToast('Errore nel salvataggio'); return false; }
}
async function deleteGuestRecord(username){
  try{ await apiWrite('deleteGuest', {username}); }catch(e){}
}
async function fetchAllGuests(){
  try{
    const res = await apiRead('getAllGuests', {});
    return (res && res.data ? res.data : []).map(normalizeGuestObj);
  }catch(e){ return []; }
}
async function loadAllGuestsForAdmin(){
  state.guests = await fetchAllGuests();
}

/* ============================= HELPERS ============================= */
function esc(str){
  return String(str==null?'':str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(ts){
  if(!ts) return '—';
  const d = new Date(ts);
  return isNaN(d.getTime()) ? '—' : d.toLocaleDateString('it-IT');
}
function fmtTime(ts){
  const d = new Date(ts);
  return isNaN(d.getTime()) ? '' : d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}
function mapLinkButton(address){
  if(!address) return '';
  const url = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address);
  return `<a href="${url}" target="_blank" rel="noopener" class="btn btn-ghost btn-sm map-link-btn">📍 Apri in Google Maps</a>`;
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}
function applyTheme(){
  const th = state.settings.theme;
  const root = document.documentElement.style;
  root.setProperty('--bg', th.bg);
  root.setProperty('--bg-panel', th.panel);
  root.setProperty('--ink', th.ink);
  root.setProperty('--accent', th.accent);
  root.setProperty('--accent2', th.accent2);
  const fp = FONT_PAIRS[th.fontPair] || FONT_PAIRS.botanical;
  root.setProperty('--font-display', fp.display);
  root.setProperty('--font-body', fp.body);
  root.setProperty('--bg-image', th.bgImage ? `linear-gradient(rgba(246,241,228,0.55), rgba(246,241,228,0.55)), url('${th.bgImage}')` : 'none');
}
function removeThemeImage(field){
  state.settings.theme[field] = '';
  applyTheme(); saveSettings(); render();
}
function setThemeImageUrl(field, value){
  state.settings.theme[field] = value.trim();
  applyTheme(); saveSettings(); render();
}
function statusOf(g, field){
  const val = field === 'rsvp' ? g.rsvp : g.brunchRsvp;
  if(val === 'yes') return {cls:'green', label: field==='rsvp' ? 'Confermato' : 'Sì al brunch'};
  if(val === 'no') return {cls:'red', label: field==='rsvp' ? 'Non parteciperà' : 'No al brunch'};
  return {cls:'orange', label:'In attesa'};
}
function personalLink(username){
  const base = state.settings.publicBaseUrl
    ? state.settings.publicBaseUrl.trim().replace(/\/$/, '')
    : (window.location.origin + window.location.pathname);
  return base + '?g=' + encodeURIComponent(username);
}
function universalSiteLink(){
  return state.settings.publicBaseUrl
    ? state.settings.publicBaseUrl.trim().replace(/\/$/, '')
    : (window.location.origin + window.location.pathname);
}
function fillTemplate(tpl, guest){
  const link = personalLink(guest.username);
  const rep = (t)=> t
    .replaceAll('{nome}', guest.name)
    .replaceAll('{username}', guest.username)
    .replaceAll('{sposi}', state.settings.coupleNames)
    .replaceAll('{link}', link)
    .replaceAll('{data}', state.settings.weddingDateLabel||'');
  return { subject: rep(tpl.subject), body: rep(tpl.body) };
}
function stripPhone(phone){ return (phone||'').replace(/[^\d]/g,''); }
function mailtoUrl(guest, tpl){
  const f = fillTemplate(tpl, guest);
  return 'mailto:' + encodeURIComponent(guest.email) + '?subject=' + encodeURIComponent(f.subject) + '&body=' + encodeURIComponent(f.body);
}
function waUrl(guest, tpl){
  const f = fillTemplate(tpl, guest);
  const digits = stripPhone(guest.phone);
  return 'https://wa.me/' + digits + '?text=' + encodeURIComponent(f.subject + '\n\n' + f.body);
}
function qrCodeUrl(link, size){
  // Servizio pubblico gratuito, nessuna chiave richiesta. ecc=H = massima correzione
  // errori, utile per un QR stampato su carta (resiste a pieghe/macchie leggere).
  return 'https://api.qrserver.com/v1/create-qr-code/?size=' + size + 'x' + size + '&ecc=H&margin=12&data=' + encodeURIComponent(link);
}
function openQrModal(username){ state.qrModalUsername = username; render(); }
function openUniversalQrModal(){ state.qrModalUsername = '__universal__'; render(); }
function closeQrModal(){ state.qrModalUsername = null; render(); }
function markInvitoSentViaQr(username){
  markSent(username, 'invito');
  closeQrModal();
  showToast('Invito segnato come inviato');
}

/* ============================= AUTH ============================= */
async function handleLogin(){
  const rawUsername = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  state.loginError = '';
  if(!rawUsername || !password){ state.loginError = 'Inserisci nome utente e password.'; render(); return; }
  if(password !== state.settings.password){ state.loginError = 'Password non corretta.'; render(); return; }

  if(rawUsername.toLowerCase() === state.settings.adminUsername.toLowerCase()){
    state.busy = true; render();
    state.currentUser = {type:'admin'};
    await loadAllGuestsForAdmin();
    state.busy = false;
    state.view = 'admin';
    render();
    return;
  }

  const username = slugify(rawUsername);
  state.busy = true; render();
  let guest = await fetchGuestByUsername(username);
  if(!guest){
    if(!state.settings.allowSelfRegister){
      state.busy = false;
      state.loginError = 'Username non trovato. Controlla di averlo scritto come indicato dagli sposi, oppure contattali.';
      render(); return;
    }
    guest = normalizeGuestObj({
      id: username, username, name: rawUsername, rsvp:null, brunchInvite:false, brunchRsvp:null,
      respondedAt:null, brunchRespondedAt:null, createdAt: Date.now()
    });
    await saveGuestRecord(guest);
  }
  state.busy = false;
  state.currentUser = {type:'guest', authed:true};
  state.guestRecord = guest;
  state.view = 'guest';
  state.guestTab = guest.fullInviteSentAt ? (guest.rsvp ? 'luoghi' : 'rsvp') : 'save-the-date';
  render();
}
function logout(){
  state.currentUser = null; state.guestRecord = null; state.guests = [];
  state.view = 'login'; state.loginError = '';
  render();
}
function goToLogin(){
  // Dall'accesso diretto (non autenticato) porta al login, mantenendo lo username noto.
  if(state.guestRecord) state.prefillGuest = state.guestRecord.username;
  state.currentUser = null; state.guestRecord = null; state.guests = [];
  state.view = 'login'; state.loginError = '';
  render();
}

/* ============================= ADMIN: SAVE THE DATE (foto + testo) =============================
   La foto viene ridimensionata e compressa nel browser prima del salvataggio,
   così da restare entro i limiti del Google Sheet (celle da 50.000 caratteri:
   il backend la spezza comunque su più celle, ma teniamo il file leggero
   anche per non rallentare il caricamento della pagina degli invitati). */
function stdPhotoUpload(input){
  const file = input.files && input.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){ showToast('Il file non è un\'immagine'); return; }
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const MAX_SIDE = 1100;
      let w = img.width, h = img.height;
      if(w > MAX_SIDE || h > MAX_SIDE){
        const ratio = Math.min(MAX_SIDE / w, MAX_SIDE / h);
        w = Math.round(w * ratio); h = Math.round(h * ratio);
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      let quality = 0.8;
      let dataUrl = canvas.toDataURL('image/jpeg', quality);
      while(dataUrl.length > 240000 && quality > 0.35){
        quality -= 0.1;
        dataUrl = canvas.toDataURL('image/jpeg', quality);
      }
      if(dataUrl.length > 240000){ showToast('Foto troppo grande anche dopo la compressione: provane una più semplice'); return; }
      state.settings.saveTheDate.photo = dataUrl;
      saveSettings(); render();
    };
    img.onerror = function(){ showToast('Impossibile leggere l\'immagine'); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
function stdRemovePhoto(){
  state.settings.saveTheDate.photo = '';
  saveSettings(); render();
}

  state.settings.saveTheDate.text = document.getElementById('std-text').value;
  saveSettings(); render();
}

          ${filtered.length===0 ? `<tr><td colspan="7" style="text-align:center; color:var(--ink-soft); padding:20px;">Nessun invitato trovato.</td></tr>` : filtered.map(g=>{
            const st = statusOf(g,'rsvp');
            const bst = g.brunchInvite ? statusOf(g,'brunch') : null;
            return `<tr>
              <td><span class="seal ${st.cls}" title="${st.label}"></span></td>
              <td><strong>${esc(g.name)}</strong><br><span class="hint">utente: ${esc(g.username)}</span></td>
              <td>${fmtDate(g.respondedAt)}</td>
              <td>
                <label style="display:flex; align-items:center; gap:6px; font-size:12.5px;">
                  <input type="checkbox" ${g.brunchInvite?'checked':''} onchange="toggleBrunch('${g.username}')"> invitato
                </label>
              </td>
              <td>
                <select onchange="updateGuestCategory('${g.username}', this.value)" style="padding:6px 8px; border:1px solid var(--line); border-radius:8px; font-size:12.5px;">
                  <option value="adulto" ${g.ageCategory==='adulto'?'selected':''}>Adulto</option>
                  <option value="bambino" ${g.ageCategory==='bambino'?'selected':''}>Bambino</option>
                  <option value="infante" ${g.ageCategory==='infante'?'selected':''}>Infante</option>
                </select>
              </td>
              <td>${bst ? `<span class="status-row"><span class="seal ${bst.cls}"></span><span class="status-label">${bst.label}</span></span>` : '<span class="hint">—</span>'}</td>
              <td style="text-align:right; white-space:nowrap;">
                ${g.rsvp ? `<button class="btn btn-ghost btn-sm" onclick="resetGuestRsvp('${g.username}')">Azzera</button>` : ''}
                <button class="btn btn-outline-red btn-sm" onclick="removeGuest('${g.username}')">Rimuovi</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderAdminSaveTheDate(){
  const std = state.settings.saveTheDate;
  const sorted = [...state.guests].sort((a,b)=>a.name.localeCompare(b.name));
  const pendingWa = sorted.filter(g=>g.phone && !g.inviteSentAt);
  const sentCount = sorted.filter(g=>g.inviteSentAt).length;
  const noPhoneCount = sorted.filter(g=>!g.phone).length;

  return `
    <div class="card" style="margin-bottom:20px;">
      <p class="eyebrow">Save the date</p>
      <p>Qui componi il save the date che gli invitati vedono quando aprono il loro link (foto + testo), e qui sotto puoi anche mandarlo su WhatsApp a tutti i contatti dell'elenco invitati. L'invito completo con i dettagli logistici resta un passo separato, nella scheda "Inviti".</p>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <p class="eyebrow">Foto</p>
      ${std.photo
        ? `<img src="${std.photo}" alt="Save the date" style="max-width:100%; max-height:420px; border-radius:12px; display:block; margin-bottom:12px;">
           <div style="display:flex; gap:10px;">
             <label class="btn btn-ghost btn-sm" style="cursor:pointer;">Sostituisci foto<input type="file" accept="image/*" style="display:none;" onchange="stdPhotoUpload(this)"></label>
             <button class="btn btn-ghost btn-sm" style="color:var(--red);" onclick="stdRemovePhoto()">Rimuovi</button>
           </div>`
        : `<p class="hint" style="margin-bottom:12px;">Nessuna foto caricata. L'immagine viene ridimensionata e compressa automaticamente.</p>
           <label class="btn btn-accent" style="cursor:pointer;">Carica una foto<input type="file" accept="image/*" style="display:none;" onchange="stdPhotoUpload(this)"></label>`
      }
    </div>

    <div class="card" style="margin-bottom:20px;">
      <p class="eyebrow">Testo sotto la foto</p>
      <div class="field"><textarea id="std-text" rows="4" placeholder="Es. Ci sposiamo! Segnatevi la data: 12 settembre 2026. Vi aspettiamo!">${esc(std.text)}</textarea></div>
      <button class="btn btn-primary" onclick="stdSaveText()">Salva testo</button>
    </div>

    <div class="card">
      <p class="eyebrow">Broadcast WhatsApp</p>
      <p class="hint" style="margin-top:-6px;">WhatsApp non permette di mandare a più numeri con un solo click da browser: qui sotto trovi una coda pronta, uno alla volta — apri, mandi il messaggio già scritto, e quel nome sparisce da solo dall'elenco. Il testo usato è quello della scheda "Inviti" → Save the date.</p>
      <p class="hint" style="margin-top:8px;">${pendingWa.length} in coda · ${sentCount} già inviati · ${noPhoneCount} senza numero di telefono</p>
      <div style="margin-top:12px;">
        ${pendingWa.length===0
          ? `<p class="hint">Nessuno in coda: o hai già mandato il save the date a tutti quelli con un numero, o mancano ancora i numeri di telefono (si aggiungono nella scheda Invitati).</p>`
          : pendingWa.map(g=>`
              <div class="invite-row">
                <div class="invite-row-top">
                  <div><strong>${esc(g.name)}</strong><div class="mono-hint">${esc(g.phone)}</div></div>
                </div>
                <div class="invite-actions">
                  <button class="btn btn-wa btn-sm" onclick="sendInviteWa('${g.username}')">WhatsApp</button>
                </div>
              </div>`).join('')
        }
      </div>
    </div>
  `;
}

function renderAdminInviti(){
  const s = state.settings;
  const sorted = [...state.guests].sort((a,b)=>a.name.localeCompare(b.name));
  const pending = sorted.filter(g=>g.fullInviteSentAt && !g.rsvp);
  const readyForInvito = sorted.filter(g=>g.inviteSentAt && !g.fullInviteSentAt);
  const sub = state.invitiSubTab || 'da-invitare';

  function contactRow(g, kind){
    const sentAt = kind==='invite' ? g.inviteSentAt : kind==='reminder' ? g.reminderSentAt : g.fullInviteSentAt;
    const mailFn = kind==='invite' ? 'sendInviteMail' : kind==='reminder' ? 'sendReminderMail' : 'sendInvitoMail';
    const waFn = kind==='invite' ? 'sendInviteWa' : kind==='reminder' ? 'sendReminderWa' : 'sendInvitoWa';
    return `
      <div class="invite-row">
        <div class="invite-row-top">
          <div><strong>${esc(g.name)}</strong><div class="mono-hint">utente: ${esc(g.username)}</div></div>
          <span class="chip ${g.rsvp?'' : 'wait'}">${g.rsvp==='yes'?'Confermato':g.rsvp==='no'?'Non partecipa':'In attesa'}</span>
        </div>
        <div class="invite-contacts">
          <input type="email" placeholder="Email" value="${esc(g.email)}" onchange="updateGuestContact('${g.username}','email',this.value)">
          <input type="text" placeholder="Telefono (con prefisso, es. 39...)" value="${esc(g.phone)}" onchange="updateGuestContact('${g.username}','phone',this.value)">
        </div>
        <div class="invite-actions">
          <button class="btn btn-mail btn-sm" ${g.email?'':'disabled'} onclick="${mailFn}('${g.username}')">✉ Email</button>
          <button class="btn btn-wa btn-sm" ${g.phone?'':'disabled'} onclick="${waFn}('${g.username}')">WhatsApp</button>
          ${kind==='invito' ? `<button class="btn btn-ghost btn-sm" onclick="openQrModal('${g.username}')">▦ QR personale</button>` : ''}
        </div>
        ${sentAt ? `<div class="sent-note">Preparato il ${fmtDate(sentAt)} alle ${fmtTime(sentAt)} — conferma solo l'apertura del messaggio, non l'invio effettivo.</div>` : ''}
      </div>`;
  }

  return `
    <div class="card" style="margin-bottom:20px; ${s.publicBaseUrl ? '' : 'border-color:var(--red);'}">
      <p class="eyebrow">Indirizzo pubblico del sito</p>
      ${s.publicBaseUrl ? `<p class="hint" style="margin-bottom:10px;">Link in uso: <strong>${esc(s.publicBaseUrl)}</strong></p>` : `<p style="color:var(--red); font-size:13.5px; margin-bottom:10px;">Non ancora impostato: i link nei messaggi risulteranno rotti finché non lo inserisci qui sotto.</p>`}
      <p class="hint" style="margin-top:-6px;">Pubblica prima il sito con il tasto "Pubblica" in alto, copia il link pubblico che ottieni e incollalo qui sotto. Da qui in poi tutti i link personali generati per gli invitati useranno questo indirizzo.</p>
      <div style="display:flex; gap:10px; margin-top:10px;">
        <input type="text" id="public-base-url" placeholder="https://claude.site/artifacts/..." value="${esc(s.publicBaseUrl)}" style="flex:1; padding:9px 12px; border:1px solid var(--line); border-radius:9px;">
        <button class="btn btn-accent" onclick="savePublicBaseUrl()">Salva</button>
      </div>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <p class="eyebrow">QR code per la stampa</p>
      <p>Per gli inviti cartacei conviene un <strong>QR unico, identico su tutti gli inviti</strong>, invece di uno diverso per ogni invitato — così mandi in stampa un solo file. Il QR porta alla pagina di accesso normale; sul cartoncino riporti anche lo username di quella persona come testo (elenco pronto qui sotto), che l'invitato digiterà insieme alla password dopo aver inquadrato il codice.</p>
      <button class="btn btn-accent" style="margin-top:6px;" ${s.publicBaseUrl ? '' : 'disabled title="Imposta prima l\'indirizzo pubblico del sito qui sopra"'} onclick="openUniversalQrModal()">▦ Genera QR universale</button>

      <h3 style="margin-top:22px;">Elenco username da riportare sugli inviti</h3>
      ${state.guests.length===0 ? `<p class="hint">Nessun invitato in elenco ancora.</p>` : `
        <div style="border:1px solid var(--line); border-radius:10px; overflow:hidden; margin-top:8px;">
          ${[...state.guests].sort((a,b)=>a.name.localeCompare(b.name)).map((g,i)=>`
            <div style="display:flex; justify-content:space-between; gap:10px; padding:8px 12px; ${i%2? 'background:rgba(0,0,0,.02);':''}">
              <span>${esc(g.name)}</span>
              <span class="mono-hint">${esc(g.username)}</span>
            </div>`).join('')}
        </div>`
      }
    </div>

    <div class="card" style="margin-bottom:20px;">
      <p class="eyebrow">Come funziona</p>
      <p>Il processo è in due tempi: prima mandi il <strong>save the date</strong> (solo l'annuncio: foto e testo, nessuna risposta richiesta). Solo agli invitati a cui l'hai già mandato compare la seconda scheda, per mandare l'<strong>invito</strong> vero e proprio — che sblocca per loro la conferma di presenza, l'eventuale brunch e i dettagli su cerimonia, ricevimento e alloggi. I solleciti riguardano solo chi ha ricevuto l'invito e non ha ancora risposto. Per ogni invitato puoi aprire un'email o una chat WhatsApp già pronte, con un link personale che pre-compila il suo username sulla pagina di accesso. Per la stampa cartacea usa invece il QR universale qui sopra; il pulsante "QR personale" accanto a ogni invitato genera invece un QR con lo username già precompilato, utile solo per casi singoli (es. una consegna a mano a una persona sola) — non per una stampa in serie. Il messaggio va comunque confermato e inviato da te (o l'invito consegnato a mano): il sito non spedisce nulla in autonomia.</p>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <p class="eyebrow">Testi dei messaggi</p>
      <p class="hint" style="margin-top:-6px;">Segnaposto disponibili: {nome}, {username}, {sposi}, {link}, {data}.</p>
      <h3 style="margin-top:14px;">Save the date</h3>
      <div class="field"><label>Oggetto</label><input type="text" id="tpl-invite-subject" value="${esc(s.templates.invite.subject)}"></div>
      <div class="field"><label>Testo</label><textarea id="tpl-invite-body" rows="6">${esc(s.templates.invite.body)}</textarea></div>
      <h3>Invito (dettagli completi)</h3>
      <div class="field"><label>Oggetto</label><input type="text" id="tpl-invito-subject" value="${esc(s.templates.invito.subject)}"></div>
      <div class="field"><label>Testo</label><textarea id="tpl-invito-body" rows="6">${esc(s.templates.invito.body)}</textarea></div>
      <h3>Promemoria</h3>
      <div class="field"><label>Oggetto</label><input type="text" id="tpl-reminder-subject" value="${esc(s.templates.reminder.subject)}"></div>
      <div class="field"><label>Testo</label><textarea id="tpl-reminder-body" rows="5">${esc(s.templates.reminder.body)}</textarea></div>
      <button class="btn btn-primary" onclick="saveTemplatesFromForm()">Salva testi</button>
    </div>

    <div class="subnav" style="display:flex; gap:20px; border-bottom:1px solid var(--line); margin-bottom:20px; flex-wrap:wrap;">
      <button class="nav-tab ${sub==='da-invitare'?'active':''}" onclick="state.invitiSubTab='da-invitare'; render();">Invia save the date (${sorted.length})</button>
      <button class="nav-tab ${sub==='invito'?'active':''}" onclick="state.invitiSubTab='invito'; render();">Invia invito (${readyForInvito.length})</button>
      <button class="nav-tab ${sub==='solleciti'?'active':''}" onclick="state.invitiSubTab='solleciti'; render();">Solleciti — in attesa (${pending.length})</button>
    </div>

    ${sub==='da-invitare'
      ? (sorted.length===0 ? `<p>Nessun invitato in elenco ancora.</p>` : sorted.map(g=>contactRow(g,'invite')).join(''))
      : sub==='invito'
      ? (readyForInvito.length===0 ? `<p>Nessuno pronto per l'invito completo: manda prima il save the date a qualcuno, poi torna qui.</p>` : readyForInvito.map(g=>contactRow(g,'invito')).join(''))
      : (pending.length===0 ? `<p>Tutti hanno risposto: nessun sollecito da mandare.</p>` : pending.map(g=>contactRow(g,'reminder')).join(''))
    }

    ${renderQrModal()}
  `;
}

function renderQrModal(){
  if(!state.qrModalUsername) return '';
  if(state.qrModalUsername === '__universal__'){
    const link = universalSiteLink();
    return `
      <div class="modal-overlay" onclick="if(event.target===this) closeQrModal();">
        <div class="modal-box">
          <p class="eyebrow">QR code universale</p>
          <h3 style="margin:2px 0 0;">Uguale per tutti gli invitati</h3>
          <img src="${qrCodeUrl(link, 500)}" alt="QR code universale del sito">
          <p class="hint" style="word-break:break-all;">${esc(link)}</p>
          <p class="hint">Fai clic destro sull'immagine → "Salva immagine come" per scaricarla in alta risoluzione. È lo stesso file per ogni invito: ricordati di stampare anche lo username di ciascun invitato in chiaro sulla carta (vedi elenco qui sotto).</p>
          <button class="btn btn-ghost" style="margin-top:16px;" onclick="closeQrModal()">Chiudi</button>
        </div>
      </div>`;
  }
  const g = state.guests.find(x=>x.username===state.qrModalUsername);
  if(!g) return '';
  const link = personalLink(g.username);
  return `
    <div class="modal-overlay" onclick="if(event.target===this) closeQrModal();">
      <div class="modal-box">
        <p class="eyebrow">QR code invito personale</p>
        <h3 style="margin:2px 0 0;">${esc(g.name)}</h3>
        <img src="${qrCodeUrl(link, 500)}" alt="QR code per ${esc(g.name)}">
        <p class="hint" style="word-break:break-all;">${esc(link)}</p>
        <p class="hint">Fai clic destro sull'immagine → "Salva immagine come" per scaricarla in alta risoluzione, pronta per la stampa.</p>
        <div style="display:flex; flex-direction:column; gap:8px; margin-top:16px;">
          ${!g.fullInviteSentAt ? `<button class="btn btn-primary" onclick="markInvitoSentViaQr('${g.username}')">Segna invito come consegnato</button>` : `<p class="sent-note">Invito già segnato come inviato il ${fmtDate(g.fullInviteSentAt)}.</p>`}
          <button class="btn btn-ghost" onclick="closeQrModal()">Chiudi</button>
        </div>
      </div>
    </div>`;
}

      ${th.bgImage ? `<button class="btn btn-outline-red btn-sm" style="margin-top:8px;" onclick="removeThemeImage('bgImage')">Rimuovi</button>` : ''}
    </div>
  `;
}

/* ============================= MAIN RENDER ============================= */
function renderSetupNeeded(){
  return `
  <div class="center-wrap">
    <div class="card" style="max-width:480px;">
      <p class="eyebrow">Configurazione necessaria</p>
      <h2>Manca la connessione al database</h2>
      <p>Questo sito usa un Google Sheet come database. Nel file HTML, in cima allo script, sostituisci <code>"INSERISCI_QUI"</code> in <code>APPS_SCRIPT_URL</code> con l'URL del tuo Web App di Google Apps Script, poi ricarica la pagina.</p>
    </div>
  </div>`;
}
function render(){
  applyTheme();
  const app = document.getElementById('app');
  if(!backendReady){ app.innerHTML = renderSetupNeeded(); return; }
  if(state.loading){ app.innerHTML = `<div class="center-wrap"><p>Caricamento…</p></div>`; return; }
  if(!state.currentUser){ app.innerHTML = renderLogin(); return; }
  if(state.currentUser.type === 'admin') app.innerHTML = renderAdminApp();
  else app.innerHTML = renderGuestApp();
}

/* ============================= INIT ============================= */
(async function(){
  if(!backendReady){ render(); return; }
  await loadSettings();
  const params = new URLSearchParams(window.location.search);
  const gParam = params.get('g');
  if(gParam) state.prefillGuest = gParam;

  const RECOVERY_TOKEN = 'reset-matrimonio-2026';
  const resetParam = params.get('reset');
  if(resetParam === RECOVERY_TOKEN){
    const d = defaultSettings();
    state.settings.password = d.password;
    state.settings.adminUsername = d.adminUsername;
    await saveSettings();
    state.loginError = 'Password sposi ripristinata a "ruggeroclaudia" (utente "sposi"). Entra e cambiala subito da Luoghi & info.';
  }

  state.loading = false;

  // Apertura diretta dal link personale (?g=username).
  // - Se l'invito completo NON è ancora stato inviato: mostra il save the date senza login.
  // - Se l'invito completo È stato inviato: porta al login (username precompilato), così
  //   l'invitato arriva subito alla conferma presenza invece di rivedere il save the date.
  if(gParam && !state.currentUser){
    const guest = await fetchGuestByUsername(slugify(gParam));
    if(guest){
      if(guest.fullInviteSentAt){
        state.prefillGuest = guest.username;
        state.view = 'login';
      } else {
        state.currentUser = {type:'guest', authed:false};
        state.guestRecord = guest;
        state.view = 'guest';
        state.guestTab = 'save-the-date';
      }
    }
  }

  render();
})();
</script>
